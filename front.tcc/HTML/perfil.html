<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário</title>
    <link rel="stylesheet" href="../CSS/perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>

    
    <div class="header-container">
        <div class="header-left">
            <button type="button" id="back-button" class="back-button" aria-label="Voltar">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                <span class="sr-only">Voltar</span>
            </button>
            <div class="title-section">
                <h1><i class="fas fa-user-circle"></i> Perfil</h1>
            </div>
        </div>
        <div class="top-actions">
            <button id="settings-btn" class="action-icon-btn">
                <i class="fas fa-cog"></i>
            </button>
            <div id="settings-dropdown" class="settings-dropdown">
                <ul>
                    <li><a href="#"><i class="fas fa-shield-alt"></i> Política de privacidade</a></li>
                    <li><a href="#"><i class="fas fa-file-alt"></i> Termos de uso</a></li>
                    <li><a href="#"><i class="fas fa-info-circle"></i> Sobre a Sasc</a></li>
                    <li><a href="#"><i class="fas fa-question-circle"></i> Ajuda</a></li>
                    <li><a href="#" class="logout"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar-wrapper">
                <div class="profile-avatar">JS</div>
                <button class="edit-avatar-btn"><i class="fas fa-camera"></i></button>
            </div>
            <h2 class="profile-name">JOÃO SILVA</h2>
            <p class="profile-role">Gerente</p>
        </div>

        <div class="profile-details-grid">
            <div class="detail-card">
                <p class="detail-card-title">Empresa</p>
                <p class="detail-card-value">TRIANGULO MINEIRO</p>
            </div>
            <div class="detail-card">
                <p class="detail-card-title">ID da Empresa</p>
                <p class="detail-card-value">54546565</p>
            </div>
            <div class="detail-card">
                <p class="detail-card-title">Email</p>
                <p class="detail-card-value">joao.silva@triangulomineiro.com</p>
            </div>
            <div class="detail-card">
                <p class="detail-card-title">Telefone</p>
                <p class="detail-card-value">(34) 99999-9999</p>
            </div>
        </div>


        <button class="edit-profile-btn">
            <i class="fas fa-edit"></i> Editar Informações
        </button>    
    </div>

        <!-- Sidebar de Edição de Perfil -->
    <aside class="sidebar-form" id="editProfileSidebar">
        <div class="sidebar-form-header">
            <h2>Editar Informações</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <form id="editProfileForm">
            <div class="form-group">
                <label for="editName">Nome Completo</label>
                <input type="text" id="editName" name="editName" value="JOÃO SILVA" required>
            </div>
            <div class="form-group">
                <label for="editRole">Cargo</label>
                <input type="text" id="editRole" name="editRole" value="Gerente" required>
            </div>
            <div class="form-group">
                <label for="editEmail">E-mail</label>
                <input type="email" id="editEmail" name="editEmail" value="joao.silva@triangulomineiro.com" required>
            </div>
            <div class="form-group">
                <label for="editPhone">Telefone</label>
                <input type="text" id="editPhone" name="editPhone" value="(34) 99999-9999">
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="cancelEdit">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </aside>

    <script src="../JS/perfil.js"></script>
</body>
</html>
