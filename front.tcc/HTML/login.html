<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASC - Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Logo SASC -->
            <div class="login-logo">
                <img src="../IMAGENS/SASC_TM_png.png" alt="Logo SASC" class="logo-image sasc-logo-small">
            </div>

            <!-- Formulário de Login -->
            <form id="loginForm" class="login-form">
                <!-- Campo Email -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" name="email" placeholder="email" required>
                    </div>
                </div>

                <!-- Campo ID da Empresa -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🏢</span>
                        <input type="text" id="company-id" name="company-id" placeholder="id da empresa" required>
                    </div>
                </div>

                <!-- Campo Senha -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="senha" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <span class="eye-icon"><img src="../IMAGENS/eye.png" alt="Mostrar Senha"></span>
                        </button>
                    </div>
                </div>

                <!-- Link Esqueceu Senha -->
                <div class="forgot-password">
                    <a href="forgot-password.html">ESQUECEU SUA SENHA?</a>
                </div>

                <!-- Botão Entrar -->
               <button type="button" class="btn btn-login" onclick="window.location.href='../HTML/menu.html'">ENTRAR</button>
            </form>

            <!-- Texto Descritivo -->
            <div class="login-description">
                <p>acesse sua conta para gerenciar os dados de satisfação</p>
            </div>
        </div>
    </div>

    <script src="../JS/login.js"></script>

</body>
</html>
